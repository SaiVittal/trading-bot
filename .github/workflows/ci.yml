name: Continuous Integration

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-test:
    name: Backend Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install flake8 black pytest

      - name: Code Style Verification (Black)
        run: |
          # Check style without failing immediately to allow progressive updates
          black --check apps/backend || echo "Black formatting issues detected."

      - name: Lint Analysis (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 apps/backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 apps/backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-lint-build:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: apps/frontend
        run: npm ci || npm install

      - name: Lint Analysis (ESLint)
        working-directory: apps/frontend
        run: npm run lint --if-present

      - name: Production Bundle Verification (Build)
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://trading-bot-backend.render.com
          NEXT_PUBLIC_WS_URL: wss://trading-bot-backend.render.com
        run: npm run build
