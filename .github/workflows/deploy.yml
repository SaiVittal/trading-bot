name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    name: Deploy FastAPI to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Service Deployment Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not defined. Skipping deployment trigger."
            exit 0
          fi
          echo "Triggering Render automated rebuild..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK"

  deploy-frontend:
    name: Deploy Next.js to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Deploy Monorepo Frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: apps/frontend
