version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading_platform_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  redis:
    image: redis:7-alpine
    container_name: trading_platform_redis
    restart: always
    command: redis-server --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: trading_platform_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_platform}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ALPACA_API_KEY_ID=${ALPACA_API_KEY_ID}
      - ALPACA_API_SECRET_KEY=${ALPACA_API_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_ALERT_COOLDOWN=${TELEGRAM_ALERT_COOLDOWN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading_network

volumes:
  postgres_data:
  redis_data:

networks:
  trading_network:
    name: trading_network
    driver: bridge
